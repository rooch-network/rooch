runs:
  using: composite
  steps:
    - id: preinstalled
      run: |
        set -euo pipefail
        if command -v rustc >/dev/null 2>&1 \
          && command -v cargo >/dev/null 2>&1 \
          && cargo fmt --version >/dev/null 2>&1 \
          && cargo clippy --version >/dev/null 2>&1; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - run: |
        set -euo pipefail
        packages=(
          ca-certificates
          gcc
          libc6-dev
          build-essential
          libsqlite3-dev
          libprotobuf-dev
          protobuf-compiler
          wget
          cmake
          make
          clang
          g++
          libsnappy-dev
          llvm
          libclang-dev
          curl
          git
          libpq-dev
          libssl-dev
          pkg-config
          lsof
          lld
        )

        missing=()
        for pkg in "${packages[@]}"; do
          if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q "install ok installed"; then
            missing+=("$pkg")
          fi
        done

        if [ "${#missing[@]}" -gt 0 ]; then
          sudo apt-get update
          sudo apt-get install --no-install-recommends --assume-yes "${missing[@]}"
        else
          echo "All required apt packages already installed"
        fi
      shell: bash

    - uses: dtolnay/rust-toolchain@1.91.1
      if: ${{ steps.preinstalled.outputs.available != 'true' }}
      with:
        components: rustfmt, clippy
