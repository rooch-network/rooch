name: Release asset bot

on:
  workflow_dispatch:
  release:
    types: [published]
jobs:
  build:
    name: Build release asset
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            runner: self-hosted
          - platform: ubuntu-22.04
            runner: self-hosted
          - platform: macos-latest
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - name: Install LLVM and Clang (self-hosted Ubuntu)
        if: matrix.runner == 'self-hosted'
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libclang-dev \
            g++

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{secrets.GITHUB_TOKEN}}

      - name: build for ${{ matrix.platform }}
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: build rooch release asset
        run: bash ./scripts/release.sh ${{ matrix.platform }}

      - name: upload artifact asset
        uses: actions/upload-artifact@v4
        if: ${{ github.event_name != 'release'}}
        with:
          name: rooch-${{ matrix.platform }}.zip
          path: ./rooch-${{ matrix.platform }}.zip

      - name: upload rooch release asset
        if: ${{ github.event_name == 'release'}}
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./rooch-${{ matrix.platform }}.zip
          asset_name: rooch-${{ matrix.platform }}.zip
          asset_content_type: application/zip
